<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALTER EGO QUIZ ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --accent1: #ff3cac;
    --accent2: #784ba0;
    --accent3: #2b86c5;
    --neon: #00f5d4;
    --text: #f0eeff;
    --muted: #8880aa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(120,75,160,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(255,60,172,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(43,134,197,0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 20px 60px;
    position: relative;
    z-index: 1;
  }

  /* ---- HEADER ---- */
  .header {
    text-align: center;
    padding: 40px 0 32px;
  }

  .header .eyebrow {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--neon);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(38px, 10vw, 72px);
    font-weight: 800;
    line-height: 1;
    background: linear-gradient(135deg, #ff3cac, #784ba0, #2b86c5, #00f5d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }

  .header p {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
    max-width: 380px;
    margin: 0 auto 28px;
  }

  /* Floating emoji decoration */
  .float-emojis {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .emoji-float {
    position: absolute;
    font-size: 24px;
    animation: floatUp 8s ease-in-out infinite;
    opacity: 0.5;
  }

  @keyframes floatUp {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-20px) rotate(5deg); }
  }

  /* ---- PROGRESS BAR ---- */
  .progress-wrap {
    margin-bottom: 28px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: 'Syne', sans-serif;
    letter-spacing: 1px;
  }

  .progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent1), var(--neon));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* ---- QUESTION CARD ---- */
  .question-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px;
    padding: 32px 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--neon));
  }

  .q-number {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent1);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .q-emoji {
    font-size: 40px;
    margin-bottom: 14px;
    display: block;
    animation: bounce 0.5s ease;
  }

  @keyframes bounce {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .q-text {
    font-size: 19px;
    font-weight: 600;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 24px;
  }

  /* ---- OPTIONS ---- */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  .option-btn:hover {
    background: rgba(255,60,172,0.1);
    border-color: rgba(255,60,172,0.4);
    transform: translateX(4px);
  }

  .option-btn.selected {
    background: linear-gradient(135deg, rgba(255,60,172,0.2), rgba(120,75,160,0.2));
    border-color: var(--accent1);
    transform: translateX(4px);
  }

  .option-letter {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    letter-spacing: 0;
    color: var(--muted);
  }

  .option-btn.selected .option-letter {
    background: var(--accent1);
    color: white;
  }

  /* ---- NAV BUTTON ---- */
  .nav-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s ease;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    color: white;
  }

  .nav-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(255,60,172,0.3);
  }

  .nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* ---- START SCREEN ---- */
  #start-screen {
    text-align: center;
  }

  .start-btn {
    display: inline-block;
    padding: 18px 48px;
    border-radius: 99px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
    color: white;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .start-btn::after {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 99px;
    background: linear-gradient(135deg, #ff3cac, #784ba0, #2b86c5);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .start-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 40px rgba(255,60,172,0.4);
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin: 28px 0;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent1), var(--neon));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ---- RESULT SCREEN ---- */
  #result-screen {
    animation: slideIn 0.5s ease;
  }

  .result-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 24px;
    padding: 36px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, rgba(255,60,172,0.05), rgba(43,134,197,0.05));
    pointer-events: none;
  }

  .result-emoji {
    font-size: 72px;
    margin-bottom: 16px;
    display: block;
    animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes popIn {
    0% { transform: scale(0) rotate(-20deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .result-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--neon);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .result-name {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 7vw, 44px);
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent1), var(--neon));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    line-height: 1.1;
  }

  .result-celeb {
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .result-celeb span {
    color: var(--text);
    font-weight: 600;
  }

  .result-desc {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    max-width: 480px;
    margin: 0 auto 24px;
  }

  .traits {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .trait-tag {
    padding: 6px 14px;
    border-radius: 99px;
    font-size: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
    border: 1.5px solid;
  }

  .trait-tag:nth-child(1) { border-color: var(--accent1); color: var(--accent1); }
  .trait-tag:nth-child(2) { border-color: var(--neon); color: var(--neon); }
  .trait-tag:nth-child(3) { border-color: var(--accent3); color: var(--accent3); }
  .trait-tag:nth-child(4) { border-color: #ffd60a; color: #ffd60a; }

  .vibe-meter {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
  }

  .vibe-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: 'Syne', sans-serif;
  }

  .vibe-bars {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .vibe-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .vibe-name {
    font-size: 12px;
    color: var(--muted);
    width: 80px;
    text-align: left;
    flex-shrink: 0;
  }

  .vibe-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 99px;
    overflow: hidden;
  }

  .vibe-fill {
    height: 100%;
    border-radius: 99px;
    animation: growBar 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
  }

  @keyframes growBar {
    from { width: 0 !important; }
  }

  .retry-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: 1.5px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .retry-btn:hover {
    border-color: var(--accent1);
    color: var(--accent1);
  }

  /* Screen states */
  .screen { display: none; }
  .screen.active { display: block; }

  /* Fun confetti particles */
  .confetti-wrap {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
  }

  .particle {
    position: absolute;
    top: -20px;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    animation: fall linear forwards;
  }

  @keyframes fall {
    to {
      transform: translateY(110vh) rotate(720deg);
      opacity: 0;
    }
  }
</style>
</head>
<body>

<div class="container">

  <!-- START SCREEN -->
  <div id="start-screen" class="screen active">
    <div class="header" style="position:relative">
      <div class="float-emojis">
        <span class="emoji-float" style="left:5%;top:10%;animation-delay:0s">✨</span>
        <span class="emoji-float" style="left:88%;top:5%;animation-delay:1s">🌙</span>
        <span class="emoji-float" style="left:15%;top:70%;animation-delay:2s">💫</span>
        <span class="emoji-float" style="left:80%;top:65%;animation-delay:0.5s">🎭</span>
        <span class="emoji-float" style="left:50%;top:0%;animation-delay:1.5s">⚡</span>
      </div>
      <div class="eyebrow">🎭 discover your inner self</div>
      <h1>ALTER EGO<br>QUIZ</h1>
      <p>ถ้าแกมี alter ego ขึ้นมาสักคน แกจะเป็นสายไหน? Vibe เหมือนใคร? มาเช็คกันเลย! 👀✨</p>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-num">10</div>
        <div class="stat-label">คำถาม</div>
      </div>
      <div class="stat">
        <div class="stat-num">~2</div>
        <div class="stat-label">นาที</div>
      </div>
      <div class="stat">
        <div class="stat-num">8</div>
        <div class="stat-label">ผลลัพธ์</div>
      </div>
    </div>

    <div style="text-align:center">
      <button class="start-btn" onclick="startQuiz()">เริ่มเลย! 🚀</button>
    </div>

    <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:20px">ไม่มีคำตอบผิดหรือถูก • ตอบตามความรู้สึกแรก ✌️</p>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen" class="screen">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="q-counter">คำถาม 1 / 10</span>
        <span id="q-percent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="question-card" id="question-card">
      <div class="q-number" id="q-number">QUESTION 01</div>
      <span class="q-emoji" id="q-emoji">✨</span>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options-wrap"></div>
    </div>

    <button class="nav-btn" id="next-btn" disabled onclick="nextQuestion()">ถัดไป →</button>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen" class="screen">
    <div class="header" style="padding-bottom:20px">
      <div class="eyebrow">🎉 ผลลัพธ์ alter ego ของแก</div>
    </div>

    <div class="result-card">
      <span class="result-emoji" id="r-emoji"></span>
      <div class="result-label">ALTER EGO ของแกคือ</div>
      <div class="result-name" id="r-name"></div>
      <div class="result-celeb" id="r-celeb"></div>
      <div class="result-desc" id="r-desc"></div>

      <div class="traits" id="r-traits"></div>

      <div class="vibe-meter">
        <div class="vibe-label">⚡ VIBE METER</div>
        <div class="vibe-bars" id="r-vibes"></div>
      </div>
    </div>

    <button class="nav-btn" onclick="shareResult()" style="margin-bottom:12px">แชร์ผลให้เพื่อน 🔥</button>
    <button class="retry-btn" onclick="restartQuiz()">ลองใหม่อีกรอบ 🔄</button>
  </div>

</div>

<div class="confetti-wrap" id="confetti-wrap"></div>

<script>
const questions = [
  {

  {

      { text: "คนมีพลังงาน เข้าไปแล้วบรรยากาศเปลี่ยน", scores: { G: 2, F: 1 } },

  },
  {

    ]
  },
  {
    emoji: "⚡",
    text: "อะไรเติมพลังให้แกมากที่สุด?",

let currentQ = 0;
let scores = { A:0, B:0, C:0, D:0, E:0, F:0, G:0, H:0 };
let selectedAnswer = null;

function startQuiz() {
  document.getElementById('start-screen').classList.remove('active');
  document.getElementById('quiz-screen').classList.add('active');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  selectedAnswer = null;

  document.getElementById('q-counter').textContent = `คำถาม ${currentQ + 1} / 10`;
  document.getElementById('q-percent').textContent = `${currentQ * 10}%`;
  document.getElementById('progress-fill').style.width = `${currentQ * 10}%`;
  document.getElementById('q-number').textContent = `QUESTION ${String(currentQ + 1).padStart(2, '0')}`;
  document.getElementById('q-emoji').textContent = q.emoji;
  document.getElementById('q-text').textContent = q.text;

  const wrap = document.getElementById('options-wrap');
  wrap.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt.text}`;
    btn.onclick = () => selectOption(i, btn);
    wrap.appendChild(btn);
  });

  // Re-animate card
  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';

  document.getElementById('next-btn').disabled = true;
}

function selectOption(index, btn) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedAnswer = index;
  document.getElementById('next-btn').disabled = false;
}

function nextQuestion() {
  if (selectedAnswer === null) return;

  const q = questions[currentQ];
  const chosen = q.options[selectedAnswer];
  for (const [key, val] of Object.entries(chosen.scores)) {
    scores[key] += val;
  }

  currentQ++;

  if (currentQ >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('quiz-screen').classList.remove('active');
  document.getElementById('result-screen').classList.add('active');

  const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const r = results[top];

  document.getElementById('r-emoji').textContent = r.emoji;
  document.getElementById('r-name').textContent = r.name;
  document.getElementById('r-celeb').innerHTML = `Vibe เหมือน <span>${r.celeb}</span>`;
  document.getElementById('r-desc').textContent = r.desc;

  const traitsEl = document.getElementById('r-traits');
  traitsEl.innerHTML = r.traits.map(t => `<span class="trait-tag">${t}</span>`).join('');

  const vibesEl = document.getElementById('r-vibes');
  vibesEl.innerHTML = r.vibes.map(v => `
    <div class="vibe-row">
      <span class="vibe-name">${v.name}</span>
      <div class="vibe-track">
        <div class="vibe-fill" style="width:${v.value}%;background:${v.color}"></div>
      </div>
    </div>
  `).join('');

  launchConfetti();
}

function launchConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  const colors = ['#ff3cac','#784ba0','#2b86c5','#00f5d4','#ffd60a','#ffffff'];

  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = `${Math.random() * 100}vw`;
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = `${6 + Math.random() * 8}px`;
    p.style.height = `${6 + Math.random() * 8}px`;
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    p.style.animationDuration = `${2 + Math.random() * 2}s`;
    p.style.animationDelay = `${Math.random() * 0.8}s`;
    wrap.appendChild(p);
    setTimeout(() => p.remove(), 4000);
  }
}

function shareResult() {
  const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const r = results[top];
  const text = `✨ Alter Ego ของฉันคือ "${r.name}" ${r.emoji}\nVibe เหมือน ${r.celeb}\n\nมาลองดูของแกบ้าง! 🔮`;

  if (navigator.share) {
    navigator.share({ title: 'ALTER EGO QUIZ', text });
  } else {
    navigator.clipboard.writeText(text).then(() => {
      alert('Copied! แปะให้เพื่อนได้เลย 🎉');
    });
  }
}

function restartQuiz() {
  currentQ = 0;
  scores = { A:0, B:0, C:0, D:0, E:0, F:0, G:0, H:0 };
  selectedAnswer = null;

  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('start-screen').classList.add('active');
}
